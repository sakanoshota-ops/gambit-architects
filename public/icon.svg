<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Gambit Architects">
  <title>Gambit Architects</title>
  <!-- Background card -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Stylized gear silhouette behind -->
  <g opacity="0.18" fill="#60a5fa">
    <circle cx="256" cy="256" r="160"/>
    <circle cx="256" cy="256" r="96" fill="#0f172a"/>
  </g>

  <!-- "G" mark -->
  <text x="50%" y="58%"
        font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="320"
        font-weight="800"
        fill="#60a5fa"
        text-anchor="middle"
        dominant-baseline="middle">G</text>

  <!-- Sword accent (subtle) -->
  <g stroke="#3b82f6" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="380" y1="120" x2="420" y2="160"/>
    <line x1="368" y1="132" x2="408" y2="172"/>
  </g>
</svg>
